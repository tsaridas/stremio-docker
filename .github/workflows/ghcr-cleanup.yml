# Delete Docker images after PR merge or on request (default + `-nvidia` tags from ghcr-publish).

name: 'Clean up Docker images from PR or on request'

on:
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      package-name:
        description: 'Package name to clean up'
        required: true

jobs:
  purge-image:
    name: Delete image from ghcr.io
    runs-on: ubuntu-latest
    steps:
      - uses: chipkent/action-cleanup-package@v1.0.1
        with:
          package-name: ${{ github.event.repository.name }}
          tag: ${{ github.event.inputs.package-name  || github.head_ref || github.ref_name }}
          github-token: ${{ secrets.GH_DEL_PACK }}

      - name: Delete NVIDIA tag (same package, `-nvidia` suffix from ghcr-publish)
        continue-on-error: true
        uses: chipkent/action-cleanup-package@v1.0.1
        with:
          package-name: ${{ github.event.repository.name }}
          tag: ${{ github.event.inputs.package-name || github.head_ref || github.ref_name }}-nvidia
          github-token: ${{ secrets.GH_DEL_PACK }}