# Delete Docker images after PR merge or on request for a specific package name
#

name: 'Clean up Docker images from PR or on request'

on:
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      package-name:
        description: 'Package name to clean up'
        required: true

jobs:
  purge-image:
    name: Delete image from ghcr.io
    runs-on: ubuntu-latest
    steps:
      - name: Resolve package tag
        id: tag
        run: |
          sanitize_path_segment() {
            echo "$1" | sed 's/[^a-zA-Z0-9._-]/-/g' | sed 's/-\+/-/g' | sed 's/^-//;s/-$//'
          }
          RAW="${{ github.event.inputs.package-name || github.head_ref || github.ref_name }}"
          echo "tag=$(sanitize_path_segment "$RAW")" >> "$GITHUB_OUTPUT"
      - uses: chipkent/action-cleanup-package@v1.0.1
        with:
          package-name: ${{ github.event.repository.name }}
          tag: ${{ steps.tag.outputs.tag }}
          github-token: ${{ secrets.GH_DEL_PACK }}