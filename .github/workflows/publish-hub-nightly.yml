name: DockerHub-Nightly

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TMP_LOCAL_IMAGE: localhost:5000/${{ github.repository }}
  TMP_LOCAL_IMAGE_NVIDIA: localhost:5000/${{ github.repository }}-nvidia
  REGISTRY_IMAGE: ${{ github.repository }}
  REGISTRY_TAG: nightly
  REGISTRY_TAG_NVIDIA: nightly-nvidia
  VERSION: nightly
  BRANCH: development

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm/v6
          - linux/arm/v7
          - linux/arm64
          - linux/ppc64le
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare
        run: |
          mkdir -p /tmp/images
          platform=${{ matrix.platform }}
          echo "TARFILE=${platform//\//-}.tar" >> $GITHUB_ENV
          echo "TAG=${{ env.TMP_LOCAL_IMAGE }}:${platform//\//-}" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          build-args: |
            BRANCH=${{ env.BRANCH }}
            VERSION=${{ env.VERSION }}
          tags: ${{ env.TAG }}
          outputs: type=docker,dest=/tmp/images/${{ env.TARFILE }}

      - name: Load images
        run: |
          for image in /tmp/images/*.tar; do
            docker load -i $image
          done
        
      - name: Setup environment
        run: |
          npm install @playwright/test
          npx playwright install --with-deps
          docker network create --subnet=172.18.0.0/24 custom_network
          echo "172.18.0.3 172-18-0-3.519b6502d940.stremio.rocks" | sudo tee -a /etc/hosts

      - name: Run Docker Container and Test (1st run)
        run: |
          platform=${{ matrix.platform }}
          docker run -d --network custom_network --ip 172.18.0.3 -e NO_CORS=1 -e CASTING_DISABLED=1 --platform ${{ matrix.platform }} ${{ env.TMP_LOCAL_IMAGE }}:${platform//\//-}
          
          cd tests
          sleep 15 # wait for server to startup

          CONTAINER_ID=$(docker ps -a | grep stremio | awk '{print $1}')
          docker exec "$CONTAINER_ID" cat /etc/nginx/http.d/default.conf
          docker exec "$CONTAINER_ID" ps aux
          docker logs "$CONTAINER_ID"

          npx playwright test settings.spec --timeout=300000 || (
            docker ps -a;
            docker logs "$CONTAINER_ID";
            exit 1;
          )
          docker logs "$CONTAINER_ID";
          docker stop "$CONTAINER_ID"
          docker rm "$CONTAINER_ID"

      - name: Run Docker Container and Test (with http 11470)
        run: |
          platform=${{ matrix.platform }}
          docker run -d --network custom_network --ip 172.18.0.3 -e NO_CORS=1 -e CASTING_DISABLED=1 --platform ${{ matrix.platform }} ${{ env.TMP_LOCAL_IMAGE }}:${platform//\//-}
          
          cd tests
          sleep 15 # wait for server to startup

          CONTAINER_ID=$(docker ps -a | grep stremio | awk '{print $1}')
          docker exec "$CONTAINER_ID" cat /etc/nginx/http.d/default.conf
          docker exec "$CONTAINER_ID" ps aux
          docker logs "$CONTAINER_ID"

          SERVER_URL="http://172.18.0.3:11470" npx playwright test settings.spec --timeout=300000 || (
            docker ps -a;
            docker logs "$CONTAINER_ID";
            exit 1;
          )
          docker logs "$CONTAINER_ID";
          docker stop "$CONTAINER_ID"
          docker rm "$CONTAINER_ID"

      - name: Run Docker Container and Test (with IPADDRESS)
        run: |
          platform=${{ matrix.platform }}
          docker run -d --network custom_network --ip 172.18.0.3 -e CASTING_DISABLED=1 -e IPADDRESS=172.18.0.3 -v ~/.stremio-server:/root/.stremio-server --platform ${{ matrix.platform }} ${{ env.TMP_LOCAL_IMAGE }}:${platform//\//-}
          
          cd tests
          sleep 60 # wait longer for server to startup

          CONTAINER_ID=$(docker ps -a | grep stremio | awk '{print $1}')
          docker exec "$CONTAINER_ID" cat /etc/nginx/http.d/default.conf
          docker exec "$CONTAINER_ID" ps aux
          docker logs "$CONTAINER_ID"

          WEB_URL="https://172-18-0-3.519b6502d940.stremio.rocks:8080" SERVER_URL="https://172-18-0-3.519b6502d940.stremio.rocks:8080" npx playwright test settings.spec --timeout=300000 || (
            docker ps -a;
            docker logs "$CONTAINER_ID";
            exit 1;
          )
          echo "--------------------------------"
          WEB_URL="https://172-18-0-3.519b6502d940.stremio.rocks:8080" SERVER_URL="https://172-18-0-3.519b6502d940.stremio.rocks:12470" npx playwright test settings.spec --timeout=300000 || (
            docker ps -a;
            docker logs "$CONTAINER_ID";
            exit 1;
          )
          echo "--------------------------------"
          docker logs "$CONTAINER_ID"
          docker stop "$CONTAINER_ID"
          docker rm "$CONTAINER_ID"

      - name: Run Docker Container and Test (with SERVER_URL)
        run: |
          platform=${{ matrix.platform }}
          docker run -d --network custom_network --ip 172.18.0.3 -e NO_CORS=1 -e CASTING_DISABLED=1 -e SERVER_URL="http://172.18.0.3:8080/" --platform ${{ matrix.platform }} ${{ env.TMP_LOCAL_IMAGE }}:${platform//\//-}
          
          cd tests
          sleep 15 # wait for server to startup
          
          CONTAINER_ID=$(docker ps -a | grep stremio | awk '{print $1}')
          docker exec "$CONTAINER_ID" cat /etc/nginx/http.d/default.conf
          docker exec "$CONTAINER_ID" ps aux
          docker logs "$CONTAINER_ID"

          npx playwright test settings_server_url.spec --timeout=300000 || (
            docker ps -a;
            docker logs "$CONTAINER_ID";
            exit 1;
          )
          docker logs "$CONTAINER_ID";
          docker stop "$CONTAINER_ID"
          docker rm "$CONTAINER_ID"
  
      - name: Run Docker Container and Test (with AUTO_SERVER_URL)
        run: |
          platform=${{ matrix.platform }}
          docker run -d --network custom_network --ip 172.18.0.3 -e NO_CORS=1 -e CASTING_DISABLED=1 -e AUTO_SERVER_URL=1 --platform ${{ matrix.platform }} ${{ env.TMP_LOCAL_IMAGE }}:${platform//\//-}
          
          cd tests
          sleep 15 # wait for server to startup
              
          CONTAINER_ID=$(docker ps -a | grep stremio | awk '{print $1}')
          docker exec "$CONTAINER_ID" cat /etc/nginx/http.d/default.conf
          docker exec "$CONTAINER_ID" ps aux
          docker logs "$CONTAINER_ID"
    
          npx playwright test settings_server_url.spec --timeout=300000 || (
            docker ps -a;
            docker logs "$CONTAINER_ID";
            exit 1;
          )
          docker logs "$CONTAINER_ID";
          docker stop "$CONTAINER_ID"
          docker rm "$CONTAINER_ID"

      - name: Run Docker Container and Test (with WEBUI_LOCATION and WEBUI_INTERNAL_PORT)
        run: |
          platform=${{ matrix.platform }}
          docker run -d --network custom_network --ip 172.18.0.3 -e NO_CORS=1 -e CASTING_DISABLED=1 -e WEBUI_INTERNAL_PORT=9090 --platform ${{ matrix.platform }} ${{ env.TMP_LOCAL_IMAGE }}:${platform//\//-}
          
          cd tests
          sleep 15 # wait for server to startup

          CONTAINER_ID=$(docker ps -a | grep stremio | awk '{print $1}')
          docker exec "$CONTAINER_ID" cat /etc/nginx/http.d/default.conf
          docker exec "$CONTAINER_ID" ps aux
          docker logs "$CONTAINER_ID"

          WEB_URL="http://172.18.0.3:9090" SERVER_URL="http://172.18.0.3:9090" npx playwright test settings.spec --timeout=300000 || (
            docker ps -a;
            docker logs "$CONTAINER_ID";
            exit 1;
          )
            
          docker logs "$CONTAINER_ID";
          docker stop "$CONTAINER_ID"
          docker rm "$CONTAINER_ID"

      - name: Run Docker Container and Test (with basic auth)
        run: |
          platform=${{ matrix.platform }}
          docker run -d --network custom_network --ip 172.18.0.3 -e NO_CORS=1 -e USERNAME=default_user -e PASSWORD=default_pass -e CASTING_DISABLED=1 --platform ${{ matrix.platform }} ${{ env.TMP_LOCAL_IMAGE }}:${platform//\//-}
          
          cd tests
          sleep 15 # wait for server to startup
          
          CONTAINER_ID=$(docker ps -a | grep stremio | awk '{print $1}')
          docker exec "$CONTAINER_ID" cat /etc/nginx/http.d/default.conf
          docker exec "$CONTAINER_ID" ps aux
          docker logs "$CONTAINER_ID"
  
          AUTH=true npx playwright test settings.spec --timeout=300000 || (
            docker ps -a;
            docker logs "$CONTAINER_ID";
            exit 1;
          )
                
          docker logs "$CONTAINER_ID";
          docker stop "$CONTAINER_ID"
          docker rm "$CONTAINER_ID"

      - name: Upload image
        uses: actions/upload-artifact@v5
        with:
          name: images-${{ strategy.job-index }}
          path: /tmp/images/${{ env.TARFILE }}
          if-no-files-found: error
          retention-days: 1

  # Dockerfile.nvidia: CUDA + NVENC. Runs in parallel with `build`. Only linux/amd64 until
  # apt package pins in Dockerfile.nvidia are generalized per TARGETARCH (arm64/sbsa differs).
  build-nvidia:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare
        run: |
          mkdir -p /tmp/images
          platform=${{ matrix.platform }}
          echo "TARFILE=nvidia-${platform//\//-}.tar" >> $GITHUB_ENV
          echo "TAG=${{ env.TMP_LOCAL_IMAGE_NVIDIA }}:${platform//\//-}" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (Dockerfile.nvidia)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.nvidia
          platforms: ${{ matrix.platform }}
          build-args: |
            BRANCH=${{ env.BRANCH }}
            VERSION=${{ env.VERSION }}
          tags: ${{ env.TAG }}
          outputs: type=docker,dest=/tmp/images/${{ env.TARFILE }}

      - name: Load image
        run: docker load -i "/tmp/images/${{ env.TARFILE }}"

      - name: Smoke test (web UI responds)
        run: |
          platform=${{ matrix.platform }}
          docker run -d --name stremio-nvidia-smoke -e NO_CORS=1 -e CASTING_DISABLED=1 \
            --platform "$platform" "${{ env.TAG }}"
          sleep 25
          docker exec stremio-nvidia-smoke sh -c 'curl -fsS http://127.0.0.1:8080/ | head -c 500' | grep -q . || {
            docker logs stremio-nvidia-smoke
            exit 1
          }
          docker rm -f stremio-nvidia-smoke

      - name: Upload image
        uses: actions/upload-artifact@v5
        with:
          name: images-nvidia-${{ strategy.job-index }}
          path: /tmp/images/${{ env.TARFILE }}
          if-no-files-found: error
          retention-days: 1

  push:
    runs-on: ubuntu-latest
    needs:
      - build
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - name: Download images
        uses: actions/download-artifact@v5
        with:
          pattern: images-*
          merge-multiple: true
          path: /tmp/images
      - name: Load images
        run: |
          for image in /tmp/images/*.tar; do
            docker load -i $image
          done
      - name: Push images to local registry
        run: |
          docker push -a ${{ env.TMP_LOCAL_IMAGE }}
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASS }}
      - name: Create manifest list and push
        run: |
          for i in {1..3}; do
            echo "Attempt $i/3: Creating manifest list and pushing..."
            if docker buildx imagetools create -t ${{ env.REGISTRY_IMAGE }}:${{ env.REGISTRY_TAG }} \
              $(docker image ls --format '{{.Repository}}:{{.Tag}}' '${{ env.TMP_LOCAL_IMAGE }}' | tr '\n' ' '); then
              echo "Push successful on attempt $i"
              break
            else
              if [ $i -lt 3 ]; then
                wait_time=$((30 * i))
                echo "Attempt $i failed, waiting $wait_time seconds before retry..."
                sleep $wait_time
              else
                echo "All 3 attempts failed"
                exit 1
              fi
            fi
          done
      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY_IMAGE }}:${{ env.REGISTRY_TAG }}

  push-nvidia:
    runs-on: ubuntu-latest
    needs:
      - build-nvidia
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - name: Download NVIDIA images
        uses: actions/download-artifact@v5
        with:
          pattern: images-nvidia-*
          merge-multiple: true
          path: /tmp/images-nvidia
      - name: Load images
        run: |
          for image in /tmp/images-nvidia/*.tar; do
            docker load -i "$image"
          done
      - name: Push images to local registry
        run: |
          docker push -a ${{ env.TMP_LOCAL_IMAGE_NVIDIA }}
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASS }}
      - name: Create NVIDIA manifest list and push
        run: |
          for i in {1..3}; do
            echo "Attempt $i/3: Creating NVIDIA manifest list and pushing..."
            if docker buildx imagetools create -t ${{ env.REGISTRY_IMAGE }}:${{ env.REGISTRY_TAG_NVIDIA }} \
              $(docker image ls --format '{{.Repository}}:{{.Tag}}' '${{ env.TMP_LOCAL_IMAGE_NVIDIA }}' | tr '\n' ' '); then
              echo "Push successful on attempt $i"
              break
            else
              if [ $i -lt 3 ]; then
                wait_time=$((30 * i))
                echo "Attempt $i failed, waiting $wait_time seconds before retry..."
                sleep $wait_time
              else
                echo "All 3 attempts failed"
                exit 1
              fi
            fi
          done
      - name: Inspect NVIDIA image
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY_IMAGE }}:${{ env.REGISTRY_TAG_NVIDIA }}
